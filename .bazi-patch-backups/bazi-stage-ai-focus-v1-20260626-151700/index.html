<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>命理剧情解读系统</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <h1>命理剧情解读系统</h1>
        <p>本地排盘、取象与岁运推演工作台。</p>
        <strong id="status">等待输入。</strong>
      </section>

      <section class="panel input-section" id="birthForm"></section>

      <section class="panel transit-selector-section" id="fortuneTransitPanel"></section>

      <section class="panel core-seven-chart-section" id="coreChartSection">
        <section id="chartSummary"></section>
        <section class="floating-assist core-chart-assist" id="floatingAssist"></section>
      </section>

      <section class="stage-analysis-section natal-analysis">
        <div class="stage-analysis-header">
          <div>
            <h2>原局分析</h2>
            <p>原局结构、命局取象与基础判断。</p>
          </div>
        </div>

        <section class="stage-image-content" id="natalImagePanel"></section>
        <section class="stage-ai-collapse stage-ai-below" id="natalAiNarrative"></section>
      </section>

      <section class="analysis-section transit-stage-analysis">
        <section class="stage-analysis-section" id="luckStageAnalysis"></section>
        <section class="stage-analysis-section" id="yearStageAnalysis"></section>
        <section class="stage-analysis-section" id="monthStageAnalysis"></section>
      </section>

      <section id="baseBaziPanel" hidden></section>

      <div class="ai-chat-float" id="aiChatFloat">
        <button type="button" class="ai-chat-toggle" id="aiChatToggle" aria-expanded="false" aria-controls="aiChatDrawer">AI 问答</button>
        <aside class="ai-chat-drawer" id="aiChatDrawer" hidden>
          <div class="ai-chat-drawer-head">
            <strong>AI 问答</strong>
            <button type="button" id="aiChatClose">关闭</button>
          </div>
          <section id="aiChatPanel"></section>
        </aside>
      </div>

    </main>
    <script src="js/locationData.js?v=20260612b"></script>
    <script type="module" src="js/app.js?v=20260613c"></script>
  </body>
</html>
