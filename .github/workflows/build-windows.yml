name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
      - name: Create AI config
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path config
          @"
          {
            "provider": "deepseek",
            "enabled": true,
            "deepseek": {
              "apiKey": "${{ secrets.DEEPSEEK_API_KEY }}",
              "endpoint": "https://api.deepseek.com/chat/completions",
              "model": "deepseek-chat"
            }
          }
          "@ | Set-Content -Encoding UTF8 config/ai-config.json
            - name: Build Windows exe
              run: npm run dist:win-portable

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bazi-ai-v1-windows
          path: dist/*.exe
