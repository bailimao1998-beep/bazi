<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>命理剧情解读系统</title>
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <main class="app">
      <section class="hero">
        <h1>命理剧情解读系统</h1>
        <p>本地排盘、取象与岁运推演工作台。</p>
        <strong id="status">等待输入。</strong>
      </section>

      <section class="birth-dock" id="birthDock">
        <section class="panel birth-dock-form" id="birthForm"></section>
        <section class="panel birth-dock-summary" id="birthSummary" hidden></section>
      </section>

      <section class="core-workbench" id="coreWorkbench">
        <section class="transit-control-panel" id="fortuneTransitPanel"></section>
        <aside class="core-chart-panel" id="chartSummary"></aside>
        <section class="floating-assist" id="floatingAssist"></section>
      </section>

      <section class="analysis-section natal-analysis">
        <div class="section-heading">
          <h2>原局分析</h2>
          <p>原局取象与 AI 辅助解读，供细看复核。</p>
        </div>

        <section class="natal-analysis-layout">
          <section class="panel natal-image-area" id="natalImagePanel"></section>
          <section class="panel natal-ai-card" id="natalAiNarrative"></section>
        </section>
      </section>

      <section class="analysis-section transit-analysis" id="transitAnalysisSection">
        <div class="section-heading">
          <h2>岁运取象与 AI</h2>
          <p>围绕当前选中的大运、流年、流月展开细读；具体内容在上方岁运工作台内折叠查看。</p>
        </div>
      </section>

      <section id="baseBaziPanel" hidden></section>

      <div class="ai-chat-float" id="aiChatFloat">
        <button type="button" class="ai-chat-toggle" id="aiChatToggle" aria-expanded="false" aria-controls="aiChatDrawer">AI 问答</button>
        <aside class="ai-chat-drawer" id="aiChatDrawer" hidden>
          <div class="ai-chat-drawer-head">
            <strong>AI 问答</strong>
            <button type="button" id="aiChatClose">关闭</button>
          </div>
          <section id="aiChatPanel"></section>
        </aside>
      </div>

    </main>
    <script src="js/locationData.js?v=20260612b"></script>
    <script type="module" src="js/app.js?v=20260613c"></script>
  </body>
</html>
